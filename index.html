<!DOCTYPE html>
<html>
  <head>
    <title>Hello, World!</title>
    <style type="text/css" media="all">
      body {
        text-align: center;
        background-color: gray;
      }
      canvas {
        border: 1px solid black;
      }
    </style>
    
    <script type="text/javascript" charset="utf-8">
     //create drawing vars 
     var canvas;
     var ctx;
     
     //create imput vars
     var upKey;
     var rightKey;
     var downKey;
     var leftKey;
     
     //create game vars
     var gameloop;
     var player;
     
     //runs once the page was loaded
      window.onload = function() {
        //assign canvas and context vars
        canvas = document.getElementById("game-canvas");
        ctx = canvas.getContext("2d");
        
        //setup key listeners
        setupInputs();
        //create player
        player = new Player(100, 400);
        
        //start game loop
        gameloop = setInterval(step, 1000/30);
        
       
      }
      function step() {
        //player step
        player.step();
        
        
        //draw everything
        draw();
      }
      function draw() {
        //clear the canvas
         //draw on the canvas
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, 1280, 720);
        
        //Draw the player
        player.draw();
      }
      function setupInputs() {
        document.addEventListener("keydown", function(event){
          if (event.key === "w" || event.key === "ArrowUp") {
            upKey = true;
          } else if (event.key === "a" || event.key === "ArrowLeft"){
            leftKey = true;
          } else if (event.key === "s" || event.key === "ArrowDown"){
            downKey = true;
          } else if (event.key === "d" || event.key === "ArrowRight"){
            rightKey = true;
          }
            
            
        });
           document.addEventListener("keyup", function(event){
          if (event.key === "w" || event.key === "ArrowUp") {
            upKey = false;
          } else if (event.key === "a" || event.key === "ArrowLeft"){
            leftKey = false;
          } else if (event.key === "s" || event.key === "ArrowDown"){
            downKey = false;
          } else if (event.key === "d" || event.key === "ArrowRight"){
            rightKey = false;
          }
            
            
        });
      }
    </script>
    
    <script type="text/javascript" charset="utf-8">
    //player
      function Player(x, y) {
        this.x = x;
        this.y = y;
        this.xspeed = 0;
        this.yspeed =0;
        this.friction = 0.6;
        this.maxSpeed = 10;
        this.width = 50;
        this.height = 100;
        this.active = true;
        
        this.step = function() {
          //movement
          if (this.active) {
            //horizontal movement
            if (!leftKey && !rightKey || leftKey && rightKey) {
              //slow down
              this.xspeed *= this.friction;
            } else if (rightKey) {
              //move right
              this.xspeed ++; 
            } else if (leftKey) {
              //move left
              this.xspeed --;
              
            }
            
            //vertical movement
            
            //Correct Speed
            if (this.xspeed > this.maxSpeed) {
              this.xspeed = this.maxSpeed;
            } else if (this.xspeed < -this.maxSpeed) {
              this.xspeed = -this.maxSpeed;
            }
            
            this.x += this.xspeed;
            this.y += this.yspeed;
          }
        }
        this.draw = function() {
          ctx.fillStyle = "green";
          ctx.fillRect(this.x, this.y, this.width, this.height)
          ctx.fillStyle = "#FFEBCD";
          ctx.fillRect(this.x, this.y, 50, 50)
          
        }
      }
    </script>
  </head>
  <body>
      <h1>Platformer</h1>
      <canvas width="1280" height="720" id="game-canvas"></canvas>
  </body>
</html>
